<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Claude Usage Statusbar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1E30"/>
      <stop offset="100%" stop-color="#0C0E1E"/>
    </linearGradient>
    <linearGradient id="usage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E05B25"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="6" y="6" width="116" height="116" rx="20"/>
    </clipPath>
    <clipPath id="barClip">
      <rect x="50" y="100" width="62" height="11" rx="5.5"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="116" height="116" rx="20" fill="url(#bg)"/>

  <g clip-path="url(#clip)">

    <!-- Editor area: code lines of varying length -->
    <rect x="18" y="18" width="46" height="7" rx="3.5" fill="#5C6E8C" opacity="0.65"/>
    <rect x="18" y="31" width="70" height="7" rx="3.5" fill="#5C6E8C" opacity="0.45"/>
    <rect x="18" y="44" width="33" height="7" rx="3.5" fill="#5C6E8C" opacity="0.55"/>
    <rect x="18" y="57" width="56" height="7" rx="3.5" fill="#5C6E8C" opacity="0.38"/>
    <rect x="18" y="70" width="40" height="7" rx="3.5" fill="#5C6E8C" opacity="0.28"/>

    <!-- Statusbar background -->
    <rect x="6" y="85" width="116" height="37" fill="#0B3969"/>
    <!-- Top border of statusbar -->
    <rect x="6" y="85" width="116" height="1.5" fill="#1A72CC" opacity="0.55"/>

    <!-- Status dot (green = active) -->
    <circle cx="20" cy="104" r="6" fill="#14532D" opacity="0.55"/>
    <circle cx="20" cy="104" r="4.5" fill="#22C55E"/>

    <!-- Small label blocks (simulate "Usage" text) -->
    <rect x="31" y="100" width="14" height="4" rx="2" fill="#90C0E2" opacity="0.55"/>
    <rect x="31" y="107" width="10" height="3.5" rx="1.5" fill="#90C0E2" opacity="0.35"/>

    <!-- Progress bar track -->
    <rect x="50" y="100" width="62" height="11" rx="5.5" fill="#082446"/>

    <!-- Progress fill: ~60% used -->
    <rect x="50" y="100" width="37" height="11" rx="5.5" fill="url(#usage)" clip-path="url(#barClip)"/>

    <!-- Right: orange accent dot -->
    <circle cx="118" cy="104" r="4" fill="#E05B25" opacity="0.75"/>

  </g>

  <!-- Subtle outer border -->
  <rect x="6" y="6" width="116" height="116" rx="20" fill="none" stroke="#2D4E82" stroke-width="1.5" opacity="0.7"/>
</svg>
