<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Claude Usage Statusbar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1E30"/>
      <stop offset="100%" stop-color="#0C0E1E"/>
    </linearGradient>
    <clipPath id="clip">
      <rect x="6" y="6" width="116" height="116" rx="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="6" y="6" width="116" height="116" rx="20" fill="url(#bg)"/>

  <g clip-path="url(#clip)">
    <!-- Editor code lines -->
    <rect x="18" y="18" width="46" height="6" rx="3" fill="#5C6E8C" opacity="0.65"/>
    <rect x="18" y="30" width="70" height="6" rx="3" fill="#5C6E8C" opacity="0.45"/>
    <rect x="18" y="42" width="33" height="6" rx="3" fill="#5C6E8C" opacity="0.55"/>
    <rect x="18" y="54" width="56" height="6" rx="3" fill="#5C6E8C" opacity="0.38"/>
    <rect x="18" y="66" width="40" height="6" rx="3" fill="#5C6E8C" opacity="0.28"/>

    <!-- Statusbar background -->
    <rect x="6" y="84" width="116" height="38" fill="#0B3969"/>
    <rect x="6" y="84" width="116" height="1.5" fill="#1A72CC" opacity="0.55"/>

    <!-- blocks: right-aligned -->
    <text x="114" y="109" font-family="monospace" font-size="20" fill="#E05B25" text-anchor="end">▰▰▰▱</text>
  </g>

  <!-- Subtle outer border -->
  <rect x="6" y="6" width="116" height="116" rx="20" fill="none" stroke="#2D4E82" stroke-width="1.5" opacity="0.7"/>
</svg>
